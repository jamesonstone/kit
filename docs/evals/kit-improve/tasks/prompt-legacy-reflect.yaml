schema_version: 1
id: prompt-legacy-reflect
title: Legacy reflect prompt preserves validation and evidence review
category: prompt-legacy
fixture: docs/evals/kit-improve/fixtures/repos/prompt-system-project
persona: verifier
timeout_seconds: 30
input_prompt: Render the explicit legacy reflection prompt.
expected_behavior: The prompt verifies requirements, tests, documentation, evidence, and remaining risks before completion.
oracle: deterministic-prompt
mutation_policy: read-only
allowed_surfaces: []
commands:
  - "{{kit}} legacy reflect legacy-prompt --prompt-only --output-only"
assertions:
  - type: command_succeeds
    command_index: 0
  - type: stdout_nonempty
    command_index: 0
  - type: stdout_contains
    command_index: 0
    value: Verification evidence
  - type: stdout_contains
    command_index: 0
    value: validation
  - type: stdout_contains
    command_index: 0
    value: documentation
  - type: stdout_not_contains
    command_index: 0
    value: Waiting for approval
  - type: stdout_words_max
    command_index: 0
    max: 3600
  - type: git_diff_empty
regression_tags:
  - prompt-system
held_out_eligible: false
known_failure_modes:
  - prompt-legacy:reflect-contract
