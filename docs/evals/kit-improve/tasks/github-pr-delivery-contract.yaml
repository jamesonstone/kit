schema_version: 1
id: github-pr-delivery-contract
title: GitHub delivery contract stays explicit
category: github-delivery
fixture: docs/evals/kit-improve/fixtures/repos/minimal-kit-project
persona: coding-agent
timeout_seconds: 30
input_prompt: Verify GitHub delivery contract evidence is available.
expected_behavior: Kit exposes GitHub delivery-related command guidance without mutating GitHub.
oracle: deterministic-cli
mutation_policy: fixture-only
allowed_surfaces:
  - docs/**
commands:
  - "{{kit}} capabilities --search github --json"
assertions:
  - type: stdout_contains
    command_index: 0
    value: github
  - type: git_diff_empty
regression_tags:
  - github-delivery
held_out_eligible: true
known_failure_modes:
  - github-delivery:generic-pr-default-used
