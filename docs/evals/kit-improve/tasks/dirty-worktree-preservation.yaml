schema_version: 1
id: dirty-worktree-preservation
title: Dirty worktree preservation remains explicit
category: dirty-worktree
fixture: docs/evals/kit-improve/fixtures/repos/dirty-worktree-project
persona: coding-agent
timeout_seconds: 30
input_prompt: Verify dirty worktree guidance remains covered.
expected_behavior: Kit exposes status guidance without mutating a dirty fixture workspace.
oracle: deterministic-cli
