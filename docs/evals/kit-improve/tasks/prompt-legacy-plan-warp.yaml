schema_version: 1
id: prompt-legacy-plan-warp
title: Legacy Warp plan prompt preserves its staged artifact contract
category: prompt-legacy
fixture: docs/evals/kit-improve/fixtures/repos/prompt-system-project
persona: planner
timeout_seconds: 30
input_prompt: Render the Warp integration variant of the explicit legacy plan prompt.
expected_behavior: The prompt converts conversational Warp context into PLAN.md and asks only about blocking ambiguity.
oracle: deterministic-prompt
mutation_policy: read-only
allowed_surfaces: []
commands:
  - "{{kit}} legacy plan legacy-prompt --warp --prompt-only --output-only"
assertions:
  - type: command_succeeds
    command_index: 0
  - type: stdout_nonempty
    command_index: 0
  - type: stdout_contains
    command_index: 0
    value: SPEC.md wins on conflict
  - type: stdout_contains
    command_index: 0
    value: material non-discoverable design choice
  - type: stdout_not_contains
    command_index: 0
    value: additional batches of up to 10 questions
  - type: stdout_not_contains
    command_index: 0
    value: text.verbosity
  - type: stdout_words_max
    command_index: 0
    max: 3000
  - type: git_diff_empty
regression_tags:
  - prompt-system
held_out_eligible: false
known_failure_modes:
  - prompt-legacy:warp-plan-contract
