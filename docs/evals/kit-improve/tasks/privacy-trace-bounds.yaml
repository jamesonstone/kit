schema_version: 1
id: privacy-trace-bounds
title: Trace privacy bounds remain explicit
category: privacy
fixture: docs/evals/kit-improve/fixtures/repos/minimal-kit-project
persona: coding-agent
timeout_seconds: 30
input_prompt: Verify trace privacy guidance remains covered.
expected_behavior: Kit exposes trace artifact bounds in improve run capability metadata.
oracle: deterministic-cli
mutation_policy: fixture-only
allowed_surfaces:
  - docs/**
commands:
  - "{{kit}} capabilities improve run --json"
assertions:
  - type: stdout_contains
    command_index: 0
    value: .kit/improve
  - type: git_diff_empty
regression_tags:
  - privacy
held_out_eligible: true
known_failure_modes:
  - privacy:raw-traces-uploaded
