schema_version: 1
id: prompt-frontend-code-review
title: Frontend review profile adds relevant visual verification only once
category: prompt-profile
fixture: docs/evals/kit-improve/fixtures/repos/prompt-system-project
persona: frontend-reviewer
timeout_seconds: 30
input_prompt: Render code review with the frontend profile.
expected_behavior: The prompt retains read-only review constraints and adds concise responsive and rendered-UI checks.
oracle: deterministic-prompt
mutation_policy: read-only
allowed_surfaces: []
commands:
  - "{{kit}} --profile=frontend code-review --output-only"
assertions:
  - type: command_succeeds
    command_index: 0
  - type: stdout_nonempty
    command_index: 0
  - type: stdout_contains
    command_index: 0
    value: Frontend Profile
  - type: stdout_contains
    command_index: 0
    value: responsive
  - type: stdout_contains
    command_index: 0
    value: screenshot
  - type: stdout_not_contains
    command_index: 0
    value: Waiting for approval
  - type: stdout_words_max
    command_index: 0
    max: 2100
  - type: git_diff_empty
regression_tags:
  - prompt-system
held_out_eligible: false
known_failure_modes:
  - prompt-profile:missing-frontend-verification
