schema_version: 1
id: prompt-toolbox-instructions
title: Implementation-instruction toolbox prompt is outcome-oriented
category: prompt-toolbox
fixture: docs/evals/kit-improve/fixtures/repos/prompt-system-project
persona: planner
timeout_seconds: 30
input_prompt: Render the implementation-ready instruction prompt.
expected_behavior: The prompt asks for goal, constraints, acceptance, validation, and output without doing implementation.
oracle: deterministic-prompt
mutation_policy: read-only
allowed_surfaces: []
commands:
  - "{{kit}} prompt coding-agent instructions --output-only"
assertions:
  - type: command_succeeds
    command_index: 0
  - type: stdout_nonempty
    command_index: 0
  - type: stdout_contains
    command_index: 0
    value: Goal
  - type: stdout_contains
    command_index: 0
    value: Validation
  - type: stdout_contains
    command_index: 0
    value: Acceptance
  - type: stdout_not_contains
    command_index: 0
    value: Waiting for approval
  - type: stdout_words_max
    command_index: 0
    max: 500
  - type: git_diff_empty
regression_tags:
  - prompt-system
held_out_eligible: false
known_failure_modes:
  - prompt-toolbox:missing-instruction-contract
