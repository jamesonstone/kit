name: release-publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semantic tag format
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${TAG} is not semantic version format vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release quality gates
        run: |
          make vet
          make test

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Build artifacts with GoReleaser
        # publish is intentionally skipped so gh can create release with --generate-notes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean --skip=publish --skip=announce

      - name: Publish GitHub release with generated notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(dist/*.tar.gz dist/*.zip dist/checksums.txt)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release artifacts found in dist/." >&2
            exit 1
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${files[@]}" --clobber
          else
            gh release create "${TAG}" "${files[@]}" --generate-notes --title "${TAG}"
          fi
