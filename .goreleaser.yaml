version: 2

project_name: kit

builds:
  - id: kit
    main: ./cmd/kit
    binary: kit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/jamesonstone/kit/pkg/cli.Version={{ .Version }}

archives:
  - id: kit
    ids:
      - kit
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  disable: true
